<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>bible-codex · prototype</title>
    <style>
      /* Cardo for the DOM chrome (reveal card, bars) so it matches the canvas. */
      @font-face {
        font-family: "Cardo";
        font-style: normal;
        font-weight: 400;
        src: url("/fonts/Cardo-Regular.ttf") format("truetype");
      }
      @font-face {
        font-family: "Cardo";
        font-style: italic;
        font-weight: 400;
        src: url("/fonts/Cardo-Italic.ttf") format("truetype");
      }
      @font-face {
        font-family: "Cardo";
        font-style: normal;
        font-weight: 700;
        src: url("/fonts/Cardo-Bold.ttf") format("truetype");
      }
      :root {
        /* Warm "fine physical book" palette — parchment, ink, gilt. */
        --parchment: #f5edda;
        --ink: #2b2117;
        --gilt: #9a6b2f;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #2b2117;
        overflow: hidden;
        font-family: -apple-system, system-ui, sans-serif;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior: none;
      }
      #stage {
        display: block;
        width: 100vw;
        height: 100vh;
        touch-action: none;
      }
      #boot {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        color: #c9b78d;
        font-size: 14px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div id="boot">lighting the scriptorium…</div>
    <canvas id="stage"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
