name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck · lint · test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      # Skia's postinstall fetches native binaries; the engine/lint/test jobs
      # don't need them, so skip build scripts to keep CI fast. The ADR-0008
      # guard, typecheck, and Node tests all run on pure TS.
      - run: pnpm install --frozen-lockfile --config.ignore-scripts=true

      - run: pnpm run typecheck

      # ESLint carries the ADR-0008 architecture guard: a Skia/CanvasKit import
      # under src/engine or src/model fails this step.
      - run: pnpm run lint

      - run: pnpm run test
