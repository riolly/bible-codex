name: EAS Update

# Push an OTA JS/asset update to the `development` branch on every merge to
# main. Installed dev clients (built on the `development` channel) pull it on
# next launch — no rebuild, no reinstall. Native changes still need a fresh
# `eas build`; this only ships JS/assets.
on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '!app/**/*.md'

concurrency:
  group: eas-update-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    name: publish OTA
    runs-on: ubuntu-latest
    # Requires the EXPO_TOKEN repo secret (Expo access token). Skips cleanly if
    # it is not set, so forks / early pushes don't fail.
    if: ${{ github.repository == 'riolly/bible-codex' }}
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: pnpm install --frozen-lockfile --config.ignore-scripts=true

      - run: eas update --branch development --message "${{ github.event.head_commit.message }}" --non-interactive
